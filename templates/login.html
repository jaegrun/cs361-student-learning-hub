{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<section class="auth-page">
    <h2>Sign In</h2>
    <p class="auth-intro">
        This page authenticates you through the User Registration microservice
        (running in a separate process) and signs you in to the hub.
    </p>
    <div class="auth-card">
        <form method="post" action="{{ url_for('login_page') }}" class="form-vertical">
            <label>
                Username
                <input type="text" name="username" value="{{ username or '' }}" placeholder="Username" required>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Password" required>
            </label>
            <button type="submit" class="btn btn-primary">Sign In via Microservice</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register_page') }}">Register</a>.</p>
    </div>
</section>
{% endblock %}
