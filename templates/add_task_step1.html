{% extends "base.html" %}
{% block title %}Add Task — Step 1{% endblock %}
{% block content %}
<section class="add-task-form">
    <h2>Add Task — Step 1 of 2</h2>
    <p class="step-desc">Enter the task <strong>name</strong> and an optional <strong>snippet</strong> (short description or note).</p>
    <form method="post" action="{{ url_for('add_task_step1') }}" class="form">
        <div class="form-group">
            <label for="name">Task Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" required
                   value="{{ request.form.name if request.form else '' }}"
                   placeholder="e.g. Complete reading assignment"
                   maxlength="200" autofocus>
        </div>
        <div class="form-group">
            <label for="snippet">Snippet (optional)</label>
            <textarea id="snippet" name="snippet" rows="3" placeholder="Brief note or description...">{{ request.form.snippet if request.form else '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Continue to Step 2 →</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
